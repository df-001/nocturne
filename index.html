<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Nocturne</title>
  <link rel="stylesheet" href="style.css">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600&display=swap" rel="stylesheet">
  <style>
    .message-wrapper,
    .message-content,
    .message-bubble,
    .system-content,
    .chat-input,
    .welcome-title,
    .chip,
    .chip span {
      min-width: 0;
      max-width: 100%;
    }

    .message-bubble,
    .system-content,
    .image-caption,
    .image-meta,
    .welcome-title,
    .chip span,
    .chat-input {
      overflow-wrap: anywhere;
      word-break: break-word;
    }

    .generated-image {
      display: block;
      max-width: 100%;
      height: auto;
    }

    @media (max-width: 768px) {
      .app-container,
      .main-content,
      .messages-container,
      .input-container,
      .chat-header,
      .message-wrapper,
      .message-content,
      .message-bubble {
        min-width: 0;
        max-width: 100%;
      }

      .suggestion-chips {
        overflow-x: auto;
      }
    }
  </style>
</head>
<body>
  <div class="app-container">
    <!-- Sidebar -->
    <aside class="sidebar">
      <div class="sidebar-header">
        <div class="logo">
          <div class="logo-icon"></div>
          <span>Nocturne</span>
        </div>
        <button class="new-chat-btn" onclick="resetConversation()" id="newChatBtn">
          <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
            <line x1="12" y1="5" x2="12" y2="19"></line>
            <line x1="5" y1="12" x2="19" y2="12"></line>
          </svg>
          New chat
        </button>
      </div>
      
      <div class="sidebar-content">
        <div class="history-section">
          <div class="history-title">Today</div>
          <div class="history-item active">
            <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
              <path d="M21 15a2 2 0 0 1-2 2H7l-4 4V5a2 2 0 0 1 2-2h14a2 2 0 0 1 2 2z"></path>
            </svg>
            <span>Temporary chat</span>
          </div>
        </div>
      </div>

      <div class="sidebar-footer">
        <div class="user-menu">
          <div class="user-avatar">◆</div>
          <span class="user-name">Anonymous Chat</span>
        </div>
      </div>
    </aside>

    <!-- Main Chat Area -->
    <main class="main-content">
      <!-- Header -->
      <header class="chat-header">
        <div class="model-selector">
          <span class="model-name">Nocturne AI</span>
          <span id="serverStatus" class="status-indicator" title="Checking server status"></span>
        </div>
        <div class="header-actions">
          <button class="icon-btn" onclick="resetConversation()" title="Reset conversation">
            <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
              <polyline points="23 4 23 10 17 10"></polyline>
              <path d="M20.49 15a9 9 0 1 1-2.12-9.36L23 10"></path>
            </svg>
          </button>
        </div>
      </header>

      <!-- Messages -->
      <div id="messages" class="messages-container">
        <div class="welcome-screen" id="welcomeScreen">
          <div class="welcome-content">
            <h1 class="welcome-title">What can I help you with?</h1>
            <div class="suggestion-chips">
              <button class="chip" onclick="sendQuickMessage('Explain quantum computing in simple terms')">
                <span class="chip-icon">💡</span>
                <span>Explain quantum computing</span>
              </button>
              <button class="chip" onclick="sendQuickMessage('Write a Python function to sort a list')">
                <span class="chip-icon">💻</span>
                <span>Write Python code</span>
              </button>
              <button class="chip" onclick="sendQuickMessage('Help me brainstorm ideas for a sci-fi story')">
                <span class="chip-icon">✨</span>
                <span>Creative writing ideas</span>
              </button>
              <button class="chip" onclick="sendQuickMessage('Analyze the benefits of renewable energy')">
                <span class="chip-icon">🌱</span>
                <span>Research topic</span>
              </button>
            </div>
          </div>
        </div>
      </div>

      <!-- Input Area -->
      <div class="input-container">
        <div class="input-wrapper">
          <textarea 
            id="input" 
            class="chat-input" 
            placeholder="Message Nocturne..." 
            rows="1"
          ></textarea>
          <div class="input-actions">
            <button id="sendButton" class="send-btn" onclick="sendMessage()" disabled>
              <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5">
                <line x1="22" y1="2" x2="11" y2="13"></line>
                <polygon points="22 2 15 22 11 13 2 9 22 2"></polygon>
              </svg>
            </button>
          </div>
        </div>
        <div class="input-footer">
          <span class="disclaimer">Nocturne makes a LOT of mistakes. Check important information.</span>
        </div>
      </div>
    </main>
  </div>

  <script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/dompurify@3.1.6/dist/purify.min.js"></script>
  <script>
    const messagesDiv = document.getElementById("messages");
    const inputEl = document.getElementById("input");
    const sendButtonEl = document.getElementById("sendButton");
    const serverStatusEl = document.getElementById("serverStatus");
    const welcomeScreen = document.getElementById("welcomeScreen");
    const newChatBtn = document.getElementById("newChatBtn");

    const SERVER_URL = "https://api.darkfast.uk";
    const SESSION_STORAGE_KEY = "chat_session_id";
    const CONVERSATION_ID = "default";
    const CLIENT_RATE_LIMIT_MS = 1000;
    let serverOnline = false;
    let startupOfflineNoticeShown = false;
    let eventSource = null;
    let hasStartedChat = false;
    let lastRequestAt = 0;

    marked.setOptions({
      breaks: true,
      gfm: true,
      headerIds: false,
      mangle: false
    });

    // Auto-resize textarea
    inputEl.addEventListener("input", () => {
      inputEl.style.height = "auto";
      inputEl.style.height = Math.min(inputEl.scrollHeight, 200) + "px";
      sendButtonEl.disabled = !inputEl.value.trim() || !serverOnline;
    });

    inputEl.addEventListener("keydown", (event) => {
      if (event.key === "Enter" && !event.shiftKey) {
        event.preventDefault();
        if (!sendButtonEl.disabled) sendMessage();
      }
    });

    function createSessionId() {
      if (globalThis.crypto?.randomUUID) {
        return globalThis.crypto.randomUUID();
      }

      if (globalThis.crypto?.getRandomValues) {
        const bytes = new Uint8Array(16);
        globalThis.crypto.getRandomValues(bytes);
        bytes[6] = (bytes[6] & 0x0f) | 0x40;
        bytes[8] = (bytes[8] & 0x3f) | 0x80;
        const hex = [...bytes].map((b) => b.toString(16).padStart(2, "0"));
        return [
          hex.slice(0, 4).join(""),
          hex.slice(4, 6).join(""),
          hex.slice(6, 8).join(""),
          hex.slice(8, 10).join(""),
          hex.slice(10, 16).join("")
        ].join("-");
      }

      return `session-${Date.now()}-${Math.random().toString(16).slice(2)}`;
    }

    function getSessionId() {
      let sessionId = localStorage.getItem(SESSION_STORAGE_KEY);
      if (!sessionId) {
        sessionId = createSessionId();
        localStorage.setItem(SESSION_STORAGE_KEY, sessionId);
      }
      return sessionId;
    }

    function renderMarkdown(text) {
      const rawHtml = marked.parse(text || "");
      return DOMPurify.sanitize(rawHtml);
    }

    function hideWelcomeScreen() {
      if (!hasStartedChat && welcomeScreen) {
        welcomeScreen.style.opacity = "0";
        setTimeout(() => {
          welcomeScreen.style.display = "none";
        }, 300);
        hasStartedChat = true;
      }
    }

    function showWelcomeScreen() {
      hasStartedChat = false;
      if (welcomeScreen) {
        welcomeScreen.style.display = "flex";
        setTimeout(() => {
          welcomeScreen.style.opacity = "1";
        }, 10);
      }
    }

    function createMessageElement(text, className) {
      const wrapper = document.createElement("div");
      wrapper.className = `message-wrapper ${className}`;
      
      const avatar = document.createElement("div");
      avatar.className = "message-avatar";
      if (className === "user") {
        avatar.textContent = "◆";
      } else {
        avatar.innerHTML = "";
        avatar.classList.add("bot-avatar");
      }
      
      const content = document.createElement("div");
      content.className = "message-content";
      
      const bubble = document.createElement("div");
      bubble.className = `message-bubble ${className}`;
      
      if (className === "bot") {
        bubble.innerHTML = renderMarkdown(text);
      } else {
        bubble.textContent = text;
      }
      
      content.appendChild(bubble);
      wrapper.appendChild(avatar);
      wrapper.appendChild(content);
      
      return wrapper;
    }

    function addMessage(text, className) {
      hideWelcomeScreen();
      const msg = createMessageElement(text, className);
      messagesDiv.appendChild(msg);
      scrollToBottom();
    }

    function addSystemMessage(text) {
      hideWelcomeScreen();
      const wrapper = document.createElement("div");
      wrapper.className = "message-wrapper system";
      
      const content = document.createElement("div");
      content.className = "message-content system-content";
      content.textContent = text;
      
      wrapper.appendChild(content);
      messagesDiv.appendChild(wrapper);
      scrollToBottom();
    }

    function addImageMessage(image) {
      hideWelcomeScreen();
      const wrapper = document.createElement("div");
      wrapper.className = "message-wrapper bot";
      
      const avatar = document.createElement("div");
      avatar.className = "message-avatar bot-avatar";
      avatar.innerHTML = "";
      
      const content = document.createElement("div");
      content.className = "message-content";
      
      const bubble = document.createElement("div");
      bubble.className = "message-bubble bot image-bubble";
      
      const imgContainer = document.createElement("div");
      imgContainer.className = "image-container";
      
      const img = document.createElement("img");
      img.className = "generated-image";
      img.src = `data:${image.mimeType};base64,${image.data}`;
      img.alt = image.prompt || "Generated image";
      img.loading = "lazy";
      
      imgContainer.appendChild(img);
      bubble.appendChild(imgContainer);
      
      if (image.prompt) {
        const caption = document.createElement("div");
        caption.className = "image-caption";
        caption.textContent = image.prompt;
        bubble.appendChild(caption);
      }
      
      const metaParts = [];
      if (image.meta?.genSeconds) metaParts.push(`${image.meta.genSeconds}s`);
      if (image.meta?.modelId) metaParts.push(image.meta.modelId);
      if (image.sizeBytes) metaParts.push(`${Math.round(image.sizeBytes / 1024)} KB`);
      
      if (metaParts.length > 0) {
        const meta = document.createElement("div");
        meta.className = "image-meta";
        meta.textContent = metaParts.join(" • ");
        bubble.appendChild(meta);
      }
      
      content.appendChild(bubble);
      wrapper.appendChild(avatar);
      wrapper.appendChild(content);
      messagesDiv.appendChild(wrapper);
      scrollToBottom();
    }

    function scrollToBottom() {
      messagesDiv.scrollTo({
        top: messagesDiv.scrollHeight,
        behavior: "smooth"
      });
    }

    function setServerOnlineState(isOnline) {
      serverOnline = isOnline;
      inputEl.disabled = !isOnline;
      sendButtonEl.disabled = !isOnline || !inputEl.value.trim();
      newChatBtn.disabled = !isOnline;
      
      serverStatusEl.className = `status-indicator ${isOnline ? "online" : "offline"}`;
      serverStatusEl.title = isOnline ? "Server online" : "Server offline";
    }

    function connectEventStream() {
      if (eventSource) eventSource.close();
      
      const sessionId = getSessionId();
      const params = new URLSearchParams({ sessionId });
      eventSource = new EventSource(`${SERVER_URL}/events?${params.toString()}`);
      
      eventSource.addEventListener("connected", () => {
        console.log("Event stream connected");
      });
      
      eventSource.addEventListener("tool-status", (event) => {
        try {
          const data = JSON.parse(event.data);
          if (data.conversationId !== CONVERSATION_ID) return;
          addSystemMessage(data.message);
        } catch (err) {
          console.error("Failed to parse tool-status event", err);
        }
      });
      
      eventSource.addEventListener("assistant-response", (event) => {
        try {
          const data = JSON.parse(event.data);
          console.log("Assistant response event received", data);
        } catch (err) {
          console.error("Failed to parse assistant-response event", err);
        }
      });
      
      eventSource.onerror = () => {
        console.warn("Event stream disconnected");
      };
    }

    function tryConnectEventStream() {
      try {
        connectEventStream();
      } catch (err) {
        console.error("Failed to open event stream", err);
        addSystemMessage("Live updates are unavailable, but the server is online.");
      }
    }

    async function checkServerStatus() {
      try {
        const response = await fetch(`${SERVER_URL}/health`, { method: "GET" });
        if (!response.ok) throw new Error(`HTTP ${response.status}`);
        
        setServerOnlineState(true);
        setTimeout(tryConnectEventStream, 0);
      } catch (err) {
        setServerOnlineState(false);
        if (!startupOfflineNoticeShown) {
          addSystemMessage("Nocturne is sleeping. Ironic isn't it?");
          startupOfflineNoticeShown = true;
        }
      }
    }

    async function sendMessage() {
      if (!serverOnline) {
        addSystemMessage("Nocturne is sleeping. Ironic isn't it?");
        return;
      }
      
      const text = inputEl.value.trim();
      if (!text) return;

      const now = Date.now();
      const waitMs = CLIENT_RATE_LIMIT_MS - (now - lastRequestAt);
      if (waitMs > 0) {
        addSystemMessage(`Slow down a bit. Try again in ${(waitMs / 1000).toFixed(1)}s.`);
        return;
      }
      lastRequestAt = now;
      
      addMessage(text, "user");
      inputEl.value = "";
      inputEl.style.height = "auto";
      sendButtonEl.disabled = true;
      
      // Show typing indicator
      const typingId = showTypingIndicator();
      
      try {
        const response = await fetch(`${SERVER_URL}/prompt`, {
          method: "POST",
          headers: { "Content-Type": "application/json" },
          body: JSON.stringify({
            sessionId: getSessionId(),
            conversationId: CONVERSATION_ID,
            prompt: text
          })
        });
        
        removeTypingIndicator(typingId);
        const data = await response.json();
        
        if (response.status === 429) {
          addSystemMessage(data.error || "You're sending messages too fast. Try again shortly.");
          return;
        }
        
        if (!response.ok) throw new Error(data.error || `HTTP ${response.status}`);
        
        if (data.output) {
          addMessage(data.output, "bot");
        } else {
          addSystemMessage("No response from model");
        }
        
        if (Array.isArray(data.images)) {
          for (const image of data.images) {
            addImageMessage(image);
          }
        }
      } catch (err) {
        removeTypingIndicator(typingId);
        console.error(err);
        addSystemMessage(`Error contacting server: ${err.message}`);
        setServerOnlineState(false);
      }
    }

    function sendQuickMessage(text) {
      inputEl.value = text;
      inputEl.style.height = "auto";
      inputEl.style.height = Math.min(inputEl.scrollHeight, 200) + "px";
      sendButtonEl.disabled = false;
      inputEl.focus();
    }

    function showTypingIndicator() {
      const id = "typing-" + Date.now();
      hideWelcomeScreen();
      
      const wrapper = document.createElement("div");
      wrapper.id = id;
      wrapper.className = "message-wrapper bot typing-wrapper";
      
      const avatar = document.createElement("div");
      avatar.className = "message-avatar bot-avatar";
      avatar.innerHTML = "";
      
      const content = document.createElement("div");
      content.className = "message-content";
      
      const bubble = document.createElement("div");
      bubble.className = "message-bubble bot typing-bubble";
      bubble.innerHTML = '<span class="typing-dot"></span><span class="typing-dot"></span><span class="typing-dot"></span>';
      
      content.appendChild(bubble);
      wrapper.appendChild(avatar);
      wrapper.appendChild(content);
      messagesDiv.appendChild(wrapper);
      scrollToBottom();
      
      return id;
    }

    function removeTypingIndicator(id) {
      const el = document.getElementById(id);
      if (el) el.remove();
    }
    function closeEventStream() {
      if (!eventSource) return;
      eventSource.close();
      eventSource = null;
    }
    async function resetConversation() {
      if (!serverOnline) {
        addSystemMessage("Server is offline.");
        return;
      }
      
      try {
        const response = await fetch(`${SERVER_URL}/reset`, {
          method: "POST",
          headers: { "Content-Type": "application/json" },
          body: JSON.stringify({
            sessionId: getSessionId(),
            conversationId: CONVERSATION_ID
          })
        });
        
        const data = await response.json();
        if (!response.ok) throw new Error(data.error || `HTTP ${response.status}`);
        
        // Clear messages and show welcome screen
        const children = Array.from(messagesDiv.children);
        children.forEach(child => {
          if (child.id !== "welcomeScreen") child.remove();
        });
        showWelcomeScreen();
      } catch (err) {
        console.error(err);
        addSystemMessage(`Reset failed: ${err.message}`);
        setServerOnlineState(false);
      }
    }

    

    window.addEventListener("beforeunload", closeEventStream);
    window.addEventListener("pagehide", closeEventStream);

    checkServerStatus();
  </script>
</body>
</html>
